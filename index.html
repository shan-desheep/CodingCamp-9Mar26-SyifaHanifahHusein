<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="dashboard-grid">

      <!-- Greeting Widget -->
      <section class="card" id="greeting-widget">
        <h2 class="card__title">Greeting</h2>
        <div class="card__content">
          <p id="greeting-text"></p>
          <p id="greeting-date"></p>
          <p id="greeting-time"></p>
          <form id="greeting-name-form">
            <input type="text" id="greeting-name-input" placeholder="Enter your name" />
            <button type="submit">Save</button>
          </form>
        </div>
      </section>

      <!-- Focus Timer Widget -->
      <section class="card" id="focus-timer-card">
        <h2 class="card__title">Focus Timer</h2>
        <div class="card__content">
          <p id="timer-display">25:00</p>
          <div id="timer-controls">
            <button id="timer-start">Start</button>
            <button id="timer-stop">Stop</button>
            <button id="timer-reset">Reset</button>
          </div>
          <form id="timer-duration-form">
            <input type="number" id="timer-duration" min="1" max="99" placeholder="Minutes (1–99)" />
            <button type="submit">Set</button>
          </form>
        </div>
      </section>

      <!-- To-Do List Widget -->
      <section class="card" id="todo-widget">
        <h2 class="card__title">To-Do List</h2>
        <div class="card__content">
          <div id="todo-categories"></div>
          <form id="todo-task-form">
            <input type="text" id="todo-task-input" placeholder="New task…" />
            <button type="submit">Add</button>
            <span class="error-msg" id="todo-task-error"></span>
          </form>
          <div id="todo-sort-controls">
            <button data-sort="date-asc">Date ↑</button>
            <button data-sort="date-desc">Date ↓</button>
            <button data-sort="status">Status</button>
          </div>
          <ul id="todo-task-list"></ul>
          <form id="todo-category-form">
            <input type="text" id="todo-category-input" placeholder="New category…" />
            <button type="submit">Add Category</button>
            <span class="error-msg" id="todo-category-error"></span>
          </form>
        </div>
      </section>

      <!-- Quick Links Widget -->
      <section class="card" id="quick-links-widget">
        <h2 class="card__title">Quick Links</h2>
        <div class="card__content">
          <div id="links-list"></div>
          <form id="links-form">
            <input type="text" id="links-label-input" placeholder="Label" />
            <input type="url" id="links-url-input" placeholder="https://…" />
            <button type="submit">Add Link</button>
            <span class="error-msg" id="links-error"></span>
          </form>
        </div>
      </section>

    </div>
    <script src="js/app.js" defer></script>
  </body>
</html>
